<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotterdam Weather</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #000000;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #ecf0f1;
            --text-muted: #94a3b8;
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.4);
        }

        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #000000 100%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 2rem;
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(230, 126, 34, 0.2);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                0 0 30px var(--accent-glow);
        }

        .main-weather {
            grid-column: 1;
            grid-row: 1 / -1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding-right: 2rem;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .header .date {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 0.5rem;
            font-weight: 400;
        }

        .current-display {
            margin: 2rem 0;
        }

        .temp-huge {
            font-size: 7rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -3px;
            margin-bottom: 0.5rem;
            color: white;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .weather-status {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 2rem;
            color: var(--text-muted);
        }

        .weather-status i {
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
        }

        .current-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .detail-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(230, 126, 34, 0.1);
            padding: 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .detail-box:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .detail-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        .detail-value {
            font-size: 1.25rem;
            font-weight: 500;
        }

        .forecast-section {
            grid-column: 2;
            grid-row: 1 / -1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            padding-left: 1rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.5rem;
            width: fit-content;
        }

        .forecast-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 1.25rem;
            border-radius: 16px;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .forecast-item:hover {
            border-left: 3px solid var(--accent);
            background: rgba(255,255,255,0.07);
        }

        .forecast-date {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .forecast-icon {
            font-size: 1.5rem;
            color: var(--accent);
            width: 40px;
            text-align: center;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .forecast-temps {
            text-align: right;
        }

        .temp-max {
            display: block;
            font-weight: 600;
        }
        
        .temp-min {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

    </style>
</head>
<body>
    <div class="dashboard">
        <div class="main-weather">
            <div class="header">
                <h1>Rotterdam</h1>
                <div class="date" id="current-date">Loading date...</div>
            </div>

            <div class="current-display">
                <div class="weather-status">
                    <i id="current-icon" class="wi wi-day-sunny"></i>
                    <span id="weather-desc">Clear Sky</span>
                </div>
                <div class="temp-huge" id="current-temp">--°</div>
            </div>

            <div class="current-details">
                <div class="detail-box">
                    <span class="detail-label">Wind</span>
                    <span class="detail-value" id="wind-speed">-- km/h</span>
                </div>
                <div class="detail-box">
                    <span class="detail-label">Humidity</span>
                    <span class="detail-value" id="humidity">--%</span>
                </div>
                <div class="detail-box">
                    <span class="detail-label">Feels Like</span>
                    <span class="detail-value" id="feels-like">--°</span>
                </div>
                <div class="detail-box">
                    <span class="detail-label">Precipitation</span>
                    <span class="detail-value" id="precipitation">-- mm</span>
                </div>
            </div>
        </div>

        <div class="forecast-section">
            <h3 class="section-title">3-Day Forecast</h3>
            <div id="forecast-container">
            </div>
        </div>
    </div>

    <script>
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('en-GB', options);
        }
        updateDate();

        function getWeatherInfo(code) {
            const codes = {
                0: { text: 'Clear sky', icon: 'wi-day-sunny' },
                1: { text: 'Mainly clear', icon: 'wi-day-cloudy' },
                2: { text: 'Partly cloudy', icon: 'wi-cloud' },
                3: { text: 'Overcast', icon: 'wi-cloudy' },
                45: { text: 'Fog', icon: 'wi-fog' },
                48: { text: 'Depositing rime fog', icon: 'wi-fog' },
                51: { text: 'Light drizzle', icon: 'wi-sprinkle' },
                53: { text: 'Moderate drizzle', icon: 'wi-sprinkle' },
                55: { text: 'Dense drizzle', icon: 'wi-sprinkle' },
                61: { text: 'Slight rain', icon: 'wi-rain' },
                63: { text: 'Moderate rain', icon: 'wi-rain' },
                65: { text: 'Heavy rain', icon: 'wi-rain' },
                71: { text: 'Slight snow', icon: 'wi-snow' },
                73: { text: 'Moderate snow', icon: 'wi-snow' },
                75: { text: 'Heavy snow', icon: 'wi-snow' },
                95: { text: 'Thunderstorm', icon: 'wi-thunderstorm' },
            };
            return codes[code] || { text: 'Unknown', icon: 'wi-na' };
        }

        async function fetchWeather() {
            try {
                const response = await fetch(
                    'https://api.open-meteo.com/v1/forecast?latitude=51.9225&longitude=4.47917&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto'
                );
                const data = await response.json();

                const current = data.current;
                const currentInfo = getWeatherInfo(current.weather_code);
                
                document.getElementById('current-temp').innerText = `${Math.round(current.temperature_2m)}°`;
                document.getElementById('weather-desc').innerText = currentInfo.text;
                document.getElementById('current-icon').className = `wi ${currentInfo.icon}`;
                
                document.getElementById('wind-speed').innerText = `${current.wind_speed_10m} km/h`;
                document.getElementById('humidity').innerText = `${current.relative_humidity_2m}%`;
                document.getElementById('feels-like').innerText = `${Math.round(current.apparent_temperature)}°`;
                document.getElementById('precipitation').innerText = `${current.precipitation} mm`;

                const daily = data.daily;
                const container = document.getElementById('forecast-container');
                container.innerHTML = '';

                for(let i = 1; i <= 3; i++) {
                    const date = new Date(daily.time[i]);
                    const dayName = date.toLocaleDateString('en-GB', { weekday: 'long' });
                    const code = daily.weather_code[i];
                    const info = getWeatherInfo(code);
                    const maxTemp = Math.round(daily.temperature_2m_max[i]);
                    const minTemp = Math.round(daily.temperature_2m_min[i]);

                    const html = `
                        <div class="forecast-item">
                            <div class="forecast-date">${dayName}</div>
                            <div class="forecast-icon"><i class="wi ${info.icon}"></i></div>
                            <div class="forecast-temps">
                                <span class="temp-max">${maxTemp}°</span>
                                <span class="temp-min">${minTemp}°</span>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                }

            } catch (error) {
                console.error('Error fetching weather:', error);
                document.getElementById('weather-desc').innerText = 'Data unavailable';
            }
        }

        fetchWeather();
        setInterval(fetchWeather, 1800000); 
    </script>
</body>
</html>

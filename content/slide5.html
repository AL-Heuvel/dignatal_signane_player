<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Festival Nieuws</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #022c22;
            --card-bg: rgba(6, 78, 59, 0.7);
            --text-main: #ecfdf5;
            --text-muted: #a7f3d0;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.15);
        }

        body { 
            background: radial-gradient(circle at center, #064e3b 0%, #000000 100%);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 80%;
            max-width: 900px;
            height: auto;
            min-height: 50vh;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(230, 126, 34, 0.2);
            border-radius: 32px;
            padding: 4rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                0 0 10px var(--accent-glow);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            box-shadow: 0 0 5px var(--accent-glow);
            align-self: flex-start;
        }

        .news-title {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 2rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--accent-glow);
        }

        .news-content {
            font-size: 1.5rem;
            line-height: 1.6;
            color: var(--text-muted);
            border-left: 4px solid var(--accent);
            padding-left: 2rem;
        }

        .meta {
            margin-top: 3rem;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1rem;
        }

        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
    <div class="container fade-in" id="news-container">
        <div class="badge">Festival Update</div>
        <h1 class="news-title" id="article-title">Laden...</h1>
        <div class="news-content" id="article-text">
           Een moment geduld alstublieft.
        </div>
        <div class="meta">
            <span id="article-date"></span>
            <span>De Turbine Nieuws</span>
        </div>
    </div>

    <script>
        const articles = [
            {
                title: "Extra tickets beschikbaar voor hoofdpodium",
                text: "Wegens enorme belangstelling zijn er op het laatste moment nog enkele kaarten vrijgekomen voor het optreden van Bruno Mars. Haal ze snel bij de kassa bij Ingang Noord!",
                date: "Zojuist geplaatst"
            },
            {
                title: "Gewijzigde looproute naar Parkeerterrein C",
                text: "Let op: door werkzaamheden aan de Maastunnel is de route naar P-Zuid aangepast. Volg de oranje borden richting 'Haven 200' voor de pendelbussen.",
                date: "Vandaag, 14:00"
            },
            {
                title: "Foodtruck Festival geopend bij het water",
                text: "Honger gekregen? Het nieuwe food court aan de Maasboulevard is nu geopend! Proef de beste lokale gerechten van Rotterdamse bodem. Nu met 10% korting op vertoon van je bandje.",
                date: "Vandaag, 12:30"
            },
            {
                title: "Verwachte drukte bij kluisjes",
                text: "We verwachten rond 19:00 grote drukte bij de lockers in Hal 2. We raden bezoekers aan om jassen en tassen zo vroeg mogelijk op te bergen.",
                date: "Belangrijke mededeling"
            },
            {
                title: "test",
                text: "test",
                date: "test"
            }
        ];

        function showRandomArticle() {
            const randomIndex = Math.floor(Math.random() * articles.length);
            const article = articles[randomIndex];

            document.getElementById('article-title').innerText = article.title;
            document.getElementById('article-text').innerText = article.text;
            document.getElementById('article-date').innerText = article.date;
        }

        showRandomArticle();

    </script>
</body>
</html>

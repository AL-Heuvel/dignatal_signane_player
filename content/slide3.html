<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Vulture - Live Tonight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-primary: #ff3333;
            --neon-secondary: #3333ff;
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Roboto Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                url('https://images.unsplash.com/photo-1459749411177-2a25413fe3a2?q=80&w=2670&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-blend-mode: hard-light;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(50,0,0,0.8), rgba(0,0,50,0.8));
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            border: 4px solid white;
            padding: 3rem 5rem;
            backdrop-filter: sepia(100%) hue-rotate(190deg) blur(5px);
            box-shadow: 
                0 0 10px var(--neon-primary),
                inset 0 0 20px var(--neon-primary);
            animation: pulse-border 2s infinite alternate;
            transform: rotate(2deg);
        }

        .band-name {
            font-family: 'Permanent Marker', cursive;
            font-size: 8rem;
            margin: 0;
            line-height: 1;
            color: white;
            text-shadow: 
                4px 4px 0px var(--neon-primary),
                -2px -2px 0px var(--neon-secondary);
            animation: glitch 3s infinite steps(1);
        }

        .sub-text {
            font-size: 2rem;
            margin-top: 1rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            color: var(--neon-secondary);
            text-shadow: 0 0 10px var(--neon-secondary);
        }

        .time {
            display: block;
            margin-top: 1rem;
            font-size: 1.5rem;
            background: white;
            color: black;
            display: inline-block;
            padding: 0.5rem 1rem;
            transform: skewX(-15deg);
            font-weight: bold;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 2px); }
            4% { transform: translate(0); }
            95% { transform: translate(0); }
            97% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes pulse-border {
            from { box-shadow: 0 0 10px var(--neon-primary), inset 0 0 20px var(--neon-primary); }
            to { box-shadow: 0 0 20px var(--neon-primary), 0 0 40px var(--neon-primary), inset 0 0 30px var(--neon-primary); }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <h1 class="band-name">MARTIN<br>GARRIX</h1>
        <div class="sub-text">Live on Stage</div>
        <div class="time">TONIGHT 23:00</div>
    </div>
</body>
</html>
